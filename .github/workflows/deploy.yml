name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/${{ secrets.EC2_USER }}/entrysport

            # Traer los últimos cambios
            git pull origin main

            # Recrear el .env en el servidor con los secrets de GitHub
            cat > .env << 'EOF'
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_NAME=${{ secrets.DB_NAME }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRES_IN=8h
            FRONTEND_URL=http://${{ secrets.EC2_HOST }}
            VITE_API_URL=http://${{ secrets.EC2_HOST }}:3000/api
            EOF

            # Reconstruir y levantar contenedores
            docker compose up --build -d

            # Limpiar imágenes antiguas para liberar espacio
            docker image prune -f
