# ── HTTP: solo para el challenge de Let's Encrypt y redirect ──────
server {
    listen 80;
    server_name chocolaterospe.space www.chocolaterospe.space;

    # Certbot usa este path para validar el dominio
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Todo lo demás → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS principal ────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name chocolaterospe.space www.chocolaterospe.space;

    ssl_certificate     /etc/letsencrypt/live/chocolaterospe.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chocolaterospe.space/privkey.pem;

    # Configuración SSL moderna
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # API del backend → proxy al contenedor backend
    location /api {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend React → contenedor frontend
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
